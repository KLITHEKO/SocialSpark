name: Simple Android CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1) Get your code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2) Install Java (needed for Kotlin/Gradle)
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # 3) Install Android SDK so Gradle can compile SDK 36
      - name: Install Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 36
          build-tools: 36.0.0

      # 4) Make the Gradle wrapper executable
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # 5) Run your unit tests
      - name: Run tests
        run: ./gradlew test

      # 6) Build the app project
      - name: Build release
        run: ./gradlew build
